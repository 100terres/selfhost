# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json

services:
  dagu:
    image: ghcr.io/dagucloud/dagu:2.7.11
    container_name: dagu
    restart: always
    networks:
      - default
      - core-registry
      - gateway-dagu-resource
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'exec 3<>/dev/tcp/localhost/8080 && printf "GET /api/v1/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n" >&3 && RESPONSE=$(cat <&3; exec 3>&-) && echo "--- LOGS ---" && echo "$RESPONSE" && if echo "$RESPONSE" | grep -q "healthy"; then echo "PASS"; exit 0; else echo "FAIL"; exit 1; fi || { echo "CONN_ERR"; exit 1; }',
        ]
    links:
      - dagu-docker-in-docker
    depends_on:
      dagu-docker-in-docker:
        condition: service_started
    expose:
      - "8080"
    volumes:
      - dagu-data:/var/lib/dagu
      - ./dags:/var/lib/dagu/dags
    environment:
      - DOCKER_HOST=tcp://dagu-docker-in-docker:2375
      - DAGU_HOME=/var/lib/dagu
      - DAGU_DAGS_DIR=/var/lib/dagu/dags
      - DAGU_AUTH_MODE=builtin
      - DAGU_TZ=Etc/UTC

  dagu-docker-in-docker:
    image: docker:dind
    container_name: "dagu-docker-in-docker"
    restart: "unless-stopped"
    privileged: "true"
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
    networks:
      - core-registry

networks:
  default:
    name: intranet
    external: true
  gateway-dagu-resource:
    name: gateway-dagu-resource
    external: true

volumes:
  dagu-data:
    driver: local
