# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json

services:
  dagu:
    image: ghcr.io/dagucloud/dagu:2.7.7
    container_name: dagu
    restart: always
    networks:
      - default
      - gateway-dagu-resource
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s --noproxy localhost localhost:8080/api/v1/health | grep -q ''"healthy"'' || exit 1',
        ]
    expose:
      - "8080"
    volumes:
      - dagu-data:/var/lib/dagu
      - ./dags:/var/lib/dagu/dags
    environment:
      - DAGU_HOME=/var/lib/dagu
      - DAGU_DAGS_DIR=/var/lib/dagu/dags
      - DAGU_AUTH_MODE=builtin
      - DAGU_TZ=Etc/UTC

networks:
  default:
    name: intranet
    external: true
  gateway-dagu-resource:
    name: gateway-dagu-resource
    external: true

volumes:
  dagu-data:
    driver: local
